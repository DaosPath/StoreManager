<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket</title>
  <link rel="stylesheet" href="ticket.css" />
</head>
<body>
  <main class="ticket-shell">
    <section class="ticket-card">
      <header class="ticket-header">
        <p class="store-name">StoreManager</p>
        <h1>Comprobante de venta</h1>
        <div class="ticket-meta">
          <div><span>Venta</span><strong id="saleNumber">#0</strong></div>
          <div><span>Fecha</span><strong id="saleDate">-</strong></div>
        </div>
      </header>

      <section class="ticket-section">
        <div class="info-grid">
          <div><span>Cajero</span><strong id="cashierName">-</strong></div>
          <div><span>Cliente</span><strong id="customerName">-</strong></div>
          <div><span>Pago</span><strong id="paymentMethod">-</strong></div>
          <div><span>Estado</span><strong id="saleStatus">-</strong></div>
        </div>
      </section>

      <section class="ticket-section">
        <table class="ticket-table">
          <thead>
            <tr>
              <th>Producto</th>
              <th>Cant.</th>
              <th>Unit.</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="ticketBody"></tbody>
        </table>
      </section>

      <section class="ticket-section totals">
        <div><span>Subtotal</span><strong id="subtotalValue">$0,00</strong></div>
        <div><span>Impuesto</span><strong id="taxValue">$0,00</strong></div>
        <div class="total-line"><span>Total</span><strong id="totalValue">$0,00</strong></div>
      </section>

      <section class="ticket-section">
        <span class="section-label">Observacion</span>
        <p id="observationText" class="observation">Sin observaciones.</p>
      </section>
    </section>
  </main>

  <script src="ticket.js"></script>
</body>
</html>
